<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Del Gaming - Official</title>
    <meta name="description" content="Del Gaming | Twitch | YouTube | TikTok | Instagram">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0a;
            position: relative;
            cursor: none;
        }

        /* LIVE ANIME WALLPAPER */
        .anime-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, #ff6b6b33 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, #4ecdc433 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, #45b7d133 0%, transparent 50%);
            z-index: 1;
            animation: pulseBg 4s ease-in-out infinite;
        }

        @keyframes pulseBg {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        /* FLOATING ANIME CHARACTER */
        .anime-char {
            position: fixed;
            bottom: -20%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjQwMCIgdmlld0JveD0iMCAwIDQwMCA0MDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIiBmaWxsPSIjRkY2QjM1IiByeD0iNTAiLz4KPGNpcmNsZSBjeD0iMjAwIiBjeT0iMTUwIiByPSI4MCIgZmlsbD0iI0ZGQjFGQSIvPgo8Y2lyY2xlIGN4PSIxNjUiIGN5PSIxMzAiIHI9IjE1IiBmaWxsPSIjRkZGRkZGIi8+CjxjaXJjbGUgY3g9IjIzNSIgY3k9IjEzMCIgcj0iMTUiIGZpbGw9IiNGRkZGRkYiLz4KPHBhdGggZD0iTTIwMCAyNDAgTDIwMCAyNzAgUTIwNSAyODAgMjE1IDI3NSBRMjI1IDI3MCAyMjUgMjYwIFoiIGZpbGw9IiMwMEFGQkMiLz4KPHBhdGggZD0iTTkwIDI5MCBRMTUwIDM0MCAyMDAgMzIwIFExODAgMzAwIDE1MCAyOTAgWiIgZmlsbD0iI0ZGQjFGQSIvPgo8L3N2Zz4K') center/contain no-repeat;
            animation: floatAnime 6s ease-in-out infinite, sway 3s ease-in-out infinite;
            z-index: 2;
            filter: drop-shadow(0 0 30px #FF6B35);
            opacity: 0.9;
        }

        @keyframes floatAnime {
            0%, 100% { transform: translateY(0px) rotate(-2deg); }
            50% { transform: translateY(-30px) rotate(2deg); }
        }

        @keyframes sway {
            0%, 100% { transform: translateX(0) rotateY(0deg); }
            50% { transform: translateX(10px) rotateY(5deg); }
        }

        /* PARTICLE SYSTEM */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #FF6B35;
            border-radius: 50%;
            animation: particleFloat 8s linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        /* MAIN CONTENT */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #FF6B35, #F7931E, #45B7D1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px #FF6B35;
            animation: neonGlow 2s ease-in-out infinite alternate;
            margin-bottom: 10px;
        }

        @keyframes neonGlow {
            from { filter: drop-shadow(0 0 10px #FF6B35); }
            to { filter: drop-shadow(0 0 30px #FF6B35); }
        }

        h1 {
            font-size: 3rem;
            color: #FFD23F;
            text-shadow: 0 0 20px #FFD23F;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin-top: 40px;
        }

        .social-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,107,53,0.5);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .social-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.6s;
        }

        .social-card:hover::before {
            left: 100%;
        }

        .social-card:hover {
            transform: translateY(-15px) scale(1.05);
            border-color: #FFD23F;
            box-shadow: 0 25px 50px rgba(255,107,53,0.4);
        }

        .platform-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            display: block;
            filter: drop-shadow(0 0 10px currentColor);
        }

        .platform-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #FFD23F;
        }

        .platform-link {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 12px 25px;
            background: linear-gradient(45deg, #FF6B35, #F7931E);
            border-radius: 50px;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255,107,53,0.4);
        }

        .platform-link:hover {
            background: linear-gradient(45deg, #FFD23F, #FF6B35);
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(255,210,63,0.6);
        }

        @media (max-width: 768px) {
            .anime-char { width: 250px; height: 250px; }
            .logo { font-size: 3rem; }
            h1 { font-size: 2rem; }
            .social-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="anime-bg"></div>
    <div class="anime-char"></div>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="logo">DEL</div>
        <h1>DEL GAMING</h1>
        <p style="color: #aaa; font-size: 1.2rem; margin-bottom: 40px;">OFFICIAL | LIVE STREAMING 24/7</p>
        
        <div class="social-grid">
            <div class="social-card">
                <span class="platform-icon" style="color: #9146FF;">🎮</span>
                <div class="platform-name">Twitch</div>
                <a href="https://twitch.tv/YOURUSERNAME" target="_blank" class="platform-link" rel="noopener">Live Now!</a>
            </div>
            
            <div class="social-card">
                <span class="platform-icon" style="color: #FF0000;">📺</span>
                <div class="platform-name">YouTube</div>
                <a href="https://youtube.com/@YOURCHANNEL" target="_blank" class="platform-link" rel="noopener">Watch VODs</a>
            </div>
            
            <div class="social-card">
                <span class="platform-icon" style="color: #FF0050;">📱</span>
                <div class="platform-name">TikTok</div>
                <a href="https://tiktok.com/@YOURUSERNAME" target="_blank" class="platform-link" rel="noopener">Clips Daily</a>
            </div>
            
            <div class="social-card">
                <span class="platform-icon" style="color: #E4405F;">📸</span>
                <div class="platform-name">Instagram</div>
                <a href="https://instagram.com/YOURUSERNAME" target="_blank" class="platform-link" rel="noopener">Follow Me</a>
            </div>
        </div>
    </div>

    <script>
        // ADVANCED PARTICLE SYSTEM
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const colors = ['#FF6B35', '#F7931E', '#45B7D1', '#FFD23F', '#FF6B6B'];
            
            setInterval(() => {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.animationDuration = (5 + Math.random() * 5) + 's';
                particle.style.animationDelay = Math.random() * 2 + 's';
                particlesContainer.appendChild(particle);
                
                setTimeout(() => particle.remove(), 10000);
            }, 300);
        }

        // MOUSE TRAIL EFFECT
        document.addEventListener('mousemove', (e) => {
            const trail = document.createElement('div');
            trail.style.cssText = `
                position: fixed;
                width: 8px;
                height: 8px;
                background: #FFD23F;
                border-radius: 50%;
                left: ${e.clientX}px;
                top: ${e.clientY}px;
                pointer-events: none;
                z-index: 100;
                animation: trailFade 0.6s ease-out forwards;
            `;
            document.body.appendChild(trail);
            
            setTimeout(() => trail.remove(), 600);
        });

        // Add trail animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes trailFade {
                to { opacity: 0; transform: scale(2) translateY(-20px); }
            }
        `;
        document.head.appendChild(style);

        createParticles();
    </script>
</body>
</html>
