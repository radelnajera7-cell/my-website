<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Del Gaming - Follow Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #0c0c1d, #1a0033, #2d1b69, #0f3460);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            z-index: 2;
            position: relative;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ff0080, #00f2fe, #ff6b6b, #4ecdc4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGlow 3s ease-in-out infinite alternate;
            margin-bottom: 1rem;
            text-shadow: 0 0 60px rgba(255, 0, 128, 0.6);
        }

        @keyframes textGlow {
            from { filter: drop-shadow(0 0 20px #ff0080); }
            to { filter: drop-shadow(0 0 40px #00f2fe); }
        }

        .tagline {
            font-size: 1.4rem;
            margin-bottom: 3rem;
            opacity: 0.9;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 1.5rem 2rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .social-btn:hover::before {
            left: 100%;
        }

        .social-btn:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            background: rgba(255,255,255,0.2);
        }

        .social-icon {
            font-size: 2.5rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .facebook .social-icon { background: #1877F2; }
        .tiktok .social-icon { background: linear-gradient(45deg, #ff0050, #ff0040); }
        .instagram .social-icon { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

        .social-text {
            text-align: left;
        }

        .username {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        .followers {
            font-size: 0.95rem;
            opacity: 0.8;
        }

        .copy-all {
            margin-top: 3rem;
            padding: 1.2rem 3rem;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }

        .copy-all:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255,107,107,0.6);
        }

        .floaters {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floater {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s infinite linear;
        }

        .floater:nth-child(1) { width: 100px; height: 100px; background: #ff0080; left: 10%; animation-delay: 0s; }
        .floater:nth-child(2) { width: 60px; height: 60px; background: #00f2fe; left: 80%; animation-delay: 5s; }
        .floater:nth-child(3) { width: 80px; height: 80px; background: #ff6b6b; left: 50%; animation-delay: 10s; }
        .floater:nth-child(4) { width: 40px; height: 40px; background: #4ecdc4; left: 20%; animation-delay: 15s; }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.1; }
            90% { opacity: 0.1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 768px) {
            .logo { font-size: 4rem; }
            .social-links { gap: 1rem; }
            .social-btn { padding: 1.2rem 1.5rem; flex-direction: column; gap: 1rem; }
            .social-icon { font-size: 2rem; width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
    <div class="floaters">
        <div class="floater"></div>
        <div class="floater"></div>
        <div class="floater"></div>
        <div class="floater"></div>
    </div>

    <div class="container">
        <div class="logo">DEL GAMING</div>
        <p class="tagline">FOLLOW KAMI SA SOCIAL MEDIA</p>

        <div class="social-links">
            <a href="https://www.facebook.com/radel.najera.75" class="social-btn facebook" target="_blank">
                <div class="social-icon"><i class="fab fa-facebook-f"></i></div>
                <div class="social-text">
                    <div class="username">radel.najera.75</div>
                    <div class="followers">🔥 Facebook</div>
                </div>
            </a>

            <a href="https://www.tiktok.com/@najeraradel37?_r=1&_t=ZS-94mQCtVDyEL" class="social-btn tiktok" target="_blank">
                <div class="social-icon"><i class="fab fa-tiktok"></i></div>
                <div class="social-text">
                    <div class="username">@najeraradel37</div>
                    <div class="followers">🎵 TikTok</div>
                </div>
            </a>

            <a href="#" class="social-btn instagram" target="_blank">
                <div class="social-icon"><i class="fab fa-instagram"></i></div>
                <div class="social-text">
                    <div class="username">@del.gaming.ph</div>
                    <div class="followers">📸 Instagram</div>
                </div>
            </a>
        </div>

        <button class="copy-all" onclick="copyLinks()">
            📋 KOPYAHIN LAHAT NG LINKS
        </button>

        <p style="margin-top: 2rem; opacity: 0.7; font-size: 0.9rem;">
            Follow para sa updates, giveaways at gaming content! 🔥
        </p>
    </div>

    <script>
        function copyLinks() {
            const links = [
                'Facebook: https://www.facebook.com/radel.najera.75',
                'TikTok: https://www.tiktok.com/@najeraradel37',
                'Instagram: https://instagram.com/del.gaming.ph'
            ].join('\n');

            navigator.clipboard.writeText(links).then(() => {
                const btn = document.querySelector('.copy-all');
                const original = btn.textContent;
                btn.textContent = '✅ NA-KOPYA NA LAHAT!';
                btn.style.background = 'linear-gradient(45deg, #00ff88, #00cc6a)';

                setTimeout(() => {
                    btn.textContent = original;
                    btn.style.background = 'linear-gradient(45deg, #ff6b6b, #4ecdc4)';
                }, 2500);
            });
        }
    </script>
</body>
</html>
